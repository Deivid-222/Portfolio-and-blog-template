
<!DOCTYPE html>
<html lang="es" class="bg-linear-to-t from-blue-100 via bg-blue-300 to-blue-600 max-w-xl mx-auto min-h-dvh">
<head>
    <!-- Meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="title" content="Favorite frameworks of David G.A template" />

    <link rel="stylesheet" href="./assets/css/output.css">

    <meta property="twitter:url" content="https://frameworks-template.netlify.app/" />

    <meta property="twitter:image" content="/assets/img/frameworks-template.png" />

<body>

    <!-- Side clouds -->
    <img src="/assets/img/clouds.png" alt="clouds" class=" hidden big:block absolute left-230 top-100 opacity-30 w-200 h-150 rotate-12 -z-10">
    <img src="/assets/img/clouds.png" alt="clouds" class=" hidden big:block absolute left-15 top-10 opacity-30 w-200 h-150 rotate-120">
    <img src="/assets/img/clouds.png" alt="clouds" class=" hidden big:block absolute left-15 bottom-10 opacity-30 w-100 h-100">
    <img src="/assets/img/clouds.png" alt="clouds" class=" hidden big:block absolute right-50 bottom-70 opacity-30 w-100 h-145 -rotate-30">

    <!-- Image and titles -->
    <header>
        <img src="./assets/img/cloud imagen header.webp" alt="Clouds in the sky" class="h-96 object-cover mask-radial-at-center mask-radial-from-60% mask-radial-to-80%">

        <section class="flex flex-col items-center justify-center">
            <h1 class=" text-white -mt-8 z-10 pb-3 font-extrabold text-2xl xs:text-3xl leading-tight">
                My favorite frameworks
            </h1>
            <h2 class="text-white bg-blue-700/50 p-3 mb-4 text-xs xs:text-lg border rounded-full shadow-lg font-display"> 
                They make me feel in a cloud
            </h2>
        </section>


        <!-- Frameworks icons -->
        <section class="flex gap-10 justify-center">
            <a class="bg-linear-to-bl from-purple-300 to bg-purple-700 frameworks-buttons" href="https://astro.build/" target="_blank" title="Astro" aria-label="astro" rel="noopener noreferrer nofollow">
                <svg width="40" height="40">
                    <use xlink:href="./assets/sprite.svg#astro" />
                </svg>
            </a>
            <a class="bg-white frameworks-buttons" href="https://tailwindcss.com/" target="_blank" title="Tailwind" aria-label="tailwind" rel="noopener noreferrer nofollow">
                <svg width="40" height="40">
                    <use xlink:href="./assets/sprite.svg#tailwind" />
                </svg>
            </a>
        </section>

        <!-- Description -->
        <p class="text-center text-favorite mt-6 font-extrabold text-xs xs:text-lg text-balance font-display">
            These frameworks have helped me a lot to create web pages in a simple and efficient way!
        </p>

    </header>

    <main class="pt-12 pb-20">

        <!-- Description title -->
        <h2 class="justify-center text-white flex font-extrabold text-sm xs:text-xl font-dis">
            Apps that I used during learning
        </h2>

        <!-- Applications used during learning -->
        <div class="grid grid-cols-3 grid-rows-2 gap-3 mt-6 my-2 w-full">

            <a href="https://open.spotify.com/intl-es/" target="_blank" title="Spotify" aria-label="Spotify" rel="noopener noreferrer nofollow" class="bg-linear-to-br from-blue-300 to bg-green-600 flex flex-col relative rounded-2xl p-5  overflow-hidden shadow-blue-400  shadow-xl items-start hover:scale-110 hover:contrast-150 transition col-span-2 min-h-35 group animate-pulse-fade-in">

                <span class="text-white font-bold text-lg xs:text-2xl absolute xs:left-60 group-hover:-translate-y-2.5 transition-transform">
                    Spotify
                </span>

            <svg width="100" height="100" class="absolute -left-4 -bottom-4 rotate-6 size-25 xs:size-30 group-hover:rotate-12 group-hover:scale-110 transition-transform">
                <use xlink:href="./assets/sprite.svg#Spotify" />
            </svg>

            </a>

            <a href="https://www.youtube.com/" target="_blank" title="Youtube" aria-label="Youtube" rel="noopener noreferrer nofollow" class=" bg-white  flex flex-col relative rounded-2xl p-5 ml-5  overflow-hidden shadow-blue-400  shadow-xl items-start hover:scale-110 hover:contrast-150 transition col-span-1 min-h-35 group animate-pulse-fade-in">

                <span class="text-black font-bold text-sm xs:text-2xl absolute group-hover:-translate-y-2.5 transition-transform">

                </span>

                <use xlink:href="./assets/sprite.svg#Youtube" />
            </svg>

            </a>

            <a href="https://brave.com/" target="_blank" title="Brave" aria-label="Brave" rel="noopener noreferrer nofollow" class=" bg-linear-to-br from-orange-300 to bg-orange-600 flex flex-col relative rounded-2xl p-5 mr-5 mt-1  overflow-hidden shadow-blue-400  shadow-xl items-start hover:scale-110 hover:contrast-150 transition col-span-1 min-h-35 group animate-pulse-fade-in">

                <span class="text-white font-bold text-xl xs:text-2xl absolute group-hover:-translate-y-2.5 transition-transform">
                    Brave
                </span>

            <svg width="100" height="100" class="absolute -left-4 -bottom-4 size-20 xs:size-25 group-hover:rotate-12 group-hover:scale-110 transition-transform">
                   <use xlink:href="./assets/sprite.svg#Brave" />
            </svg>

            </a>

            <a href="https://code.visualstudio.com/" target="_blank" title="Visual Studio Code" aria-label="Visual Studio Code" rel="noopener noreferrer nofollow" class=" bg-linear-to-br from-blue-300 to bg-blue-800 flex flex-col relative rounded-2xl p-5 mt-1 overflow-hidden  shadow-blue-400 shadow-xl items-start hover:scale-110 hover:contrast-150 transition col-span-2 min-h-35 group animate-pulse-fade-in">

                <span class="text-white font-bold text-xl xs:text-2xl absolute xs:left-60 group-hover:-translate-y-2.5 transition-transform">
                    VS Code
                </span>

            <svg width="100" height="100" class="absolute -left-4 -bottom-4 rotate-6 size-25 xs:size-30 group-hover:rotate-12 group-hover:scale-110 transition-transform">
                <use xlink:href="./assets/sprite.svg#Visual" />
            </svg>

            </a>

        </div>
    </main>
    <footer>

        <!-- Creator -->
        <span class=" flex justify-center font-display mb-4 text-xs xs:text-base">
            Made with dedication by David G.A
        </span>
